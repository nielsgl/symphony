name: PR validation

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 24.13.0
  NPM_VERSION: 11.16.0

jobs:
  fast-validation:
    name: Fast validation (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup npm
        run: npm install --global npm@${{ env.NPM_VERSION }}

      - name: Configure Git defaults
        run: git config --global init.defaultBranch main

      - name: Install dependencies
        run: npm ci

      - name: Check whitespace
        run: git diff --check

      - name: Build
        run: npm run build

      - name: Run fast tests
        run: npm test

      - name: Run repository meta checks
        run: npm run check:meta

  windows-validation:
    name: Windows install and build (windows-latest)
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup npm
        run: npm install --global npm@${{ env.NPM_VERSION }}

      - name: Configure Git defaults
        run: git config --global init.defaultBranch main

      - name: Install dependencies
        run: npm ci

      - name: Check whitespace
        run: git diff --check

      - name: Build
        run: npm run build

  integration-validation:
    name: Integration validation (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup npm
        run: npm install --global npm@${{ env.NPM_VERSION }}

      - name: Configure Git defaults
        run: git config --global init.defaultBranch main

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run integration tests
        run: npm run test:integration
